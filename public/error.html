<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tidak Ada Koneksi Internet</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #F4F5F7;
      color: #172B4D;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .container {
      padding: 2rem;
      max-width: 400px;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin-bottom: 1.5rem;
      color: #0052CC;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      line-height: 1.2;
    }
    p {
      color: #626F86;
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 2rem;
    }
    button {
      background-color: #0052CC;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 4px 6px rgba(0, 82, 204, 0.2);
      transition: background-color 0.2s;
    }
    button:active {
      background-color: #0747A6;
      transform: scale(0.98);
    }
    /* Dark mode support */
    @media (prefers-color-scheme: dark) {
      body {
        background-color: #1D2125;
        color: #FFFFFF;
      }
      p {
        color: #8C9BAB;
      }
      .icon {
        color: #579DFF;
      }
      button {
        background-color: #579DFF;
        color: #1D2125;
      }
      button:active {
        background-color: #388BFF;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"></line>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
      <path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
      <line x1="12" y1="20" x2="12.01" y2="20"></line>
    </svg>
    <h1>Koneksi Terputus</h1>
    <p>Aplikasi Kasir membutuhkan koneksi internet untuk sinkronisasi data secara real-time. Silakan periksa koneksi WiFi atau Data Seluler Anda.</p>
    <button onclick="window.location.reload()">Coba Lagi</button>
  </div>
</body>
</html>
